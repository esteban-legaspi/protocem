<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | PROTOCEM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="estilos.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header class="encabezado" id="navbar">
        <a href="index.html" class="logo">
            <img src="img/brand.png" alt="PROTOCEM">
        </a>
        <nav class="navegacion">
            <a href="index.html" class="boton-nav">Inicio</a>
        </nav>
    </header>

    <div class="contacto-container">
        <header class="header-contacto">
            <h1>Contacto PROTOCEM</h1>
            <p>Construyendo juntos tus proyectos en tiempo y forma</p>
        </header>

        <div class="grid-contacto">
            <div class="info-panel">
                <div class="card">
                    <i class="fab fa-whatsapp"></i>
                    <h3>WHATSAPP DIRECTO</h3>
                    <p>+52 449 137 29 71</p>
                    <a href="https://wa.me/524491372971" class="btn-ws" target="_blank">CHATEAR AHORA</a> 
                    
                    <div class="qr-section">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://wa.me/524491372971" alt="Escanea para WhatsApp">
                        <p style="font-size: 0.8rem; color: var(--gris); margin-top: 10px;">O escanea el código</p>
                    </div>
                </div>
    
                <div class="card">
                    <i class="fas fa-location-dot"></i>
                    <h3>UBICACIÓN</h3>
                    <p>J. Encarnación Payen #515, Aguascalientes</p>
                </div>

                <div class="card">
                    <i class="fas fa-envelope"></i>
                    <h3>CORREO ELECTRÓNICO</h3>
                    <p>protocem@hotmail.com</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
